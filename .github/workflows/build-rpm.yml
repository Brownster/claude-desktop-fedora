name: Build RPM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream Claude version (leave blank for auto-detect)'
        required: false
        default: ''
      rpm_release:
        description: 'RPM release number'
        required: false
        default: '1'

jobs:
  # ----------------------------------------------------------------
  # Lint: shellcheck + rpmlint-spec check
  # ----------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: fedora:42

    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: dnf install -y --setopt=install_weak_deps=False shellcheck rpmlint

      - name: shellcheck — all scripts
        run: |
          find packaging/scripts tests -name '*.sh' -print0 | \
            xargs -0 shellcheck --severity=warning

      - name: rpmlint — spec file
        run: |
          rpmlint packaging/fedora/claude-desktop.spec || {
            echo "rpmlint reported issues (may be advisory). Check output above."
          }

      - name: Validate desktop file syntax
        run: |
          dnf install -y --setopt=install_weak_deps=False desktop-file-utils
          desktop-file-validate packaging/fedora/claude-desktop.desktop

  # ----------------------------------------------------------------
  # Build: full pipeline in Fedora container
  # ----------------------------------------------------------------
  build-rpm:
    name: Build RPM (Fedora 42)
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: fedora:42

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            git curl jq \
            p7zip p7zip-plugins \
            rpm-build rpmdevtools \
            desktop-file-utils \
            file which tar xz \
            nodejs npm \
            python3 \
            bubblewrap \
            rsync \
            libicu \
            ca-certificates

      - name: Make scripts executable
        run: chmod +x packaging/scripts/*.sh tests/**/*.sh

      - name: Download upstream installer
        id: download
        env:
          VERSION_OVERRIDE: ${{ github.event.inputs.version }}
        run: |
          ARGS=""
          [ -n "${VERSION_OVERRIDE}" ] && ARGS="--version ${VERSION_OVERRIDE}"
          VERSION=$(packaging/scripts/download-upstream.sh ${ARGS} | tail -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Upstream version: ${VERSION}"

      - name: Extract Windows installer
        run: packaging/scripts/extract-windows.sh "${{ steps.download.outputs.version }}"

      - name: Patch Linux runtime
        run: packaging/scripts/patch-linux-runtime.sh "${{ steps.download.outputs.version }}"

      - name: Create source tarball
        id: tarball
        run: |
          TARBALL=$(packaging/scripts/make-source-tarball.sh "${{ steps.download.outputs.version }}" | tail -1)
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Build RPM
        env:
          RPM_RELEASE: ${{ github.event.inputs.rpm_release || '1' }}
        run: |
          packaging/scripts/build-rpm.sh \
            --version "${{ steps.download.outputs.version }}" \
            --release "${RPM_RELEASE}" \
            --skip-download \
            --skip-extract

      - name: Verify RPM
        run: |
          packaging/scripts/verify-artifact.sh \
            "$(find dist -name 'claude-desktop-*.x86_64.rpm' ! -name '*.src.rpm' | head -1)"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.rpm > SHA256SUMS
          cat SHA256SUMS

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-rpm-${{ steps.download.outputs.version }}
          path: |
            dist/*.rpm
            dist/SHA256SUMS
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ steps.download.outputs.version }}
          path: |
            work/upstream/upstream.json
            work/extract.json
            work/patch-manifest.json
          retention-days: 7

  # ----------------------------------------------------------------
  # Smoke test: install the RPM into a fresh Fedora container
  # ----------------------------------------------------------------
  smoke-test:
    name: Smoke test (install + validate)
    runs-on: ubuntu-latest
    needs: build-rpm
    container:
      image: fedora:42

    steps:
      - uses: actions/checkout@v4

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          pattern: claude-desktop-rpm-*
          path: dist

      - name: Install RPM
        run: |
          RPM=$(find dist -name 'claude-desktop-*.x86_64.rpm' ! -name '*.src.rpm' | head -1)
          echo "Installing: ${RPM}"
          dnf install -y "${RPM}"

      - name: Smoke test
        run: |
          chmod +x tests/smoke/install-smoke.sh
          tests/smoke/install-smoke.sh

      - name: Validate spec files
        run: |
          chmod +x tests/spec/validate-spec.sh
          tests/spec/validate-spec.sh
