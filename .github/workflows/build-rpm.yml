name: Build RPM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------
  # Lint: shellcheck + rpmlint-spec check
  # ----------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: fedora:42

    steps:
      - uses: actions/checkout@v6

      - name: Install lint tools
        run: dnf install -y --setopt=install_weak_deps=False shellcheck rpmlint

      - name: shellcheck — all scripts
        run: |
          find packaging/scripts tests -name '*.sh' -print0 | \
            xargs -0 shellcheck --severity=warning

      - name: rpmlint — spec file
        run: |
          rpmlint packaging/fedora/claude-desktop.spec || {
            echo "rpmlint reported issues (may be advisory). Check output above."
          }

      - name: Validate desktop file syntax
        run: |
          dnf install -y --setopt=install_weak_deps=False desktop-file-utils
          desktop-file-validate packaging/fedora/claude-desktop.desktop
