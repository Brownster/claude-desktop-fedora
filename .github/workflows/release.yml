name: Release

on:
  push:
    tags:
      - 'v*'     # e.g. v0.10.14-packaging.1
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.10.14-packaging.1)'
        required: true

jobs:
  # ----------------------------------------------------------------
  # Job 1: Build the RPM
  # ----------------------------------------------------------------
  build:
    name: Build RPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: fedora:42
    outputs:
      upstream: ${{ steps.version.outputs.upstream }}
      rpm_release: ${{ steps.version.outputs.rpm_release }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          UPSTREAM=$(echo "${TAG}" | sed 's/^v//' | sed 's/-packaging\.[0-9]*$//')
          RPM_REL=$(echo "${TAG}" | grep -oP 'packaging\.\K[0-9]+' || echo "1")
          echo "upstream=${UPSTREAM}" >> "$GITHUB_OUTPUT"
          echo "rpm_release=${RPM_REL}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Upstream: ${UPSTREAM}, RPM release: ${RPM_REL}"

      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            git curl jq \
            p7zip p7zip-plugins \
            rpm-build rpmdevtools \
            desktop-file-utils \
            file which tar xz unzip \
            nodejs npm \
            python3 \
            bubblewrap \
            binutils \
            ca-certificates

      - name: Make scripts executable
        run: chmod +x packaging/scripts/*.sh

      - name: Full build pipeline
        run: |
          packaging/scripts/build-rpm.sh \
            --version "${{ steps.version.outputs.upstream }}" \
            --release "${{ steps.version.outputs.rpm_release }}"

      - name: Verify RPM structure
        run: |
          packaging/scripts/verify-artifact.sh \
            "$(find dist -name 'claude-desktop-*.x86_64.rpm' ! -name '*.src.rpm' | head -1)"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.rpm > SHA256SUMS
          for f in *.rpm; do sha256sum "${f}" > "${f}.sha256"; done
          cat SHA256SUMS

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-rpm-${{ steps.version.outputs.upstream }}
          path: |
            dist/*.rpm
            dist/*.sha256
            dist/SHA256SUMS
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-logs-${{ steps.version.outputs.upstream }}
          path: |
            work/upstream/upstream.json
            work/extract.json
            work/patch-manifest.json
          retention-days: 7

  # ----------------------------------------------------------------
  # Job 2: Smoke test — install the RPM and validate it
  # Publishing is BLOCKED until this passes.
  # ----------------------------------------------------------------
  smoke-test:
    name: Smoke test (install + validate)
    runs-on: ubuntu-latest
    needs: build
    container:
      image: fedora:42

    steps:
      - uses: actions/checkout@v4

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: release-rpm-${{ needs.build.outputs.upstream }}
          path: dist

      - name: Install RPM
        run: |
          RPM=$(find dist -name 'claude-desktop-*.x86_64.rpm' ! -name '*.src.rpm' | head -1)
          echo "Installing: ${RPM}"
          dnf install -y "${RPM}"

      - name: Run install smoke test
        run: |
          chmod +x tests/smoke/install-smoke.sh
          tests/smoke/install-smoke.sh

      - name: Run spec validation
        run: |
          chmod +x tests/spec/validate-spec.sh
          tests/spec/validate-spec.sh

  # ----------------------------------------------------------------
  # Job 3: Publish — only runs after smoke test passes
  # ----------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    permissions:
      contents: write
    container:
      image: fedora:42

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gh CLI
        run: dnf install -y --setopt=install_weak_deps=False gh

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: release-rpm-${{ needs.build.outputs.upstream }}
          path: dist

      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          name: release-build-logs-${{ needs.build.outputs.upstream }}
          path: work-logs

      - name: Generate release notes
        run: |
          chmod +x packaging/scripts/generate-release-notes.sh
          # Restore upstream.json for release notes script
          mkdir -p work/upstream
          cp work-logs/upstream/upstream.json work/upstream/ 2>/dev/null || true
          packaging/scripts/generate-release-notes.sh \
            "${{ needs.build.outputs.upstream }}" \
            "${{ needs.build.outputs.rpm_release }}" > /tmp/release-notes.md

      - name: Enrich build-metadata.json with upstream provenance
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          # Read upstream provenance captured during the build
          upstream_json_path = "work/upstream/upstream.json"
          upstream = {}
          if os.path.exists(upstream_json_path):
              with open(upstream_json_path) as f:
                  upstream = json.load(f)

          meta = {
            "upstream_version": "${{ needs.build.outputs.upstream }}",
            "upstream_source_url": upstream.get("source_url", ""),
            "upstream_installer_sha256": upstream.get("sha256", ""),
            "upstream_downloaded_at": upstream.get("downloaded_at", ""),
            "rpm_release": "${{ needs.build.outputs.rpm_release }}",
            "tag": "${{ needs.build.outputs.tag }}",
            "git_commit": subprocess.check_output(["git","rev-parse","HEAD"]).decode().strip(),
            "fedora_version": "42",
            "built_at": subprocess.check_output(["date","-u","+%Y-%m-%dT%H:%M:%SZ"]).decode().strip(),
            "builder": "claude-desktop-fedora CI"
          }
          os.makedirs("dist", exist_ok=True)
          with open("dist/build-metadata.json", "w") as f:
              json.dump(meta, f, indent=2)
              f.write("\n")
          print("build-metadata.json written with upstream provenance.")
          PYEOF

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          UPSTREAM="${{ needs.build.outputs.upstream }}"

          gh release create "${TAG}" \
            --title "Claude Desktop ${UPSTREAM} (Fedora)" \
            --notes-file /tmp/release-notes.md \
            --verify-tag \
            dist/claude-desktop-*.rpm \
            dist/claude-desktop-*.rpm.sha256 \
            dist/SHA256SUMS \
            dist/build-metadata.json
